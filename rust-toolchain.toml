# Pin the workspace to a known-good rustc channel so CI, contributors,
# and Homebrew builds all see the same compiler. Bump as a deliberate
# change (not via dependabot) — the floor stays loose enough that any
# rustup-supported stable patch can build the workspace, but tight
# enough that a surprise minor-version bump can't silently change
# codegen or lint behavior under us.
[toolchain]
# hephaestus targets macOS/Apple Silicon as host. Keep the channel floor
# loose enough that Homebrew's rustc can build the workspace without a
# forced rustup install — `brew upgrade rust` or `rustup toolchain
# install 1.96` is enough if the floor moves under us.
channel = "1.96"
targets = ["aarch64-apple-darwin"]
profile = "minimal"

