# Use zig cc as the cross-linker for aarch64-linux-musl so we don't need a
# separate musl toolchain. `zig cc -target aarch64-linux-musl` bundles
# everything (headers, libc, lld). See scripts/zig-aarch64-musl-cc.sh for the
# wrapper that sets the -target flag.

[build]
target = "aarch64-unknown-linux-musl"
# Keep agent artifacts local so the root .cargo/config.toml's build/cargo_target
# (intended for the host workspace) isn't mixed with cross-compiled objects.
target-dir = "target"

[target.aarch64-unknown-linux-musl]
# rustup's aarch64-musl target ships `rust-lld` + self-contained musl
# crt1.o / libc.a; using those directly avoids needing any third-party
# cross-toolchain (zig, musl-cross, Docker, etc.) on the host.
linker = "rust-lld"
rustflags = [
    "-C", "panic=abort",
    "-C", "link-self-contained=yes",
]
