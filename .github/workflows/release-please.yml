name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release pull request
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Check release automation bootstrap
        id: bootstrap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view v0.4.0-alpha.1 >/dev/null 2>&1; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Release Please starts after the one-time v0.4.0-alpha.1 bootstrap."
          fi
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        if: steps.bootstrap.outputs.ready == 'true'
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # `pr` is intentionally unset when Release Please has nothing to update.
      # Parse it in the shell only after `prs_created` is true: using fromJSON in
      # step metadata makes GitHub evaluate an empty value before `if` can skip it.
      - name: Resolve release branch
        id: release_branch
        if: steps.release.outputs.prs_created == 'true'
        env:
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          branch="$(jq -er '.headBranchName | select(type == "string" and length > 0)' <<<"$RELEASE_PR")" || {
            echo "Release Please reported a PR update without a valid pr output" >&2
            exit 1
          }
          echo "name=$branch" >> "$GITHUB_OUTPUT"

      - name: Check out release branch
        if: steps.release_branch.outputs.name != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          fetch-depth: 0
          ref: ${{ steps.release_branch.outputs.name }}

      - name: Synchronize release lockfile
        if: steps.release_branch.outputs.name != ''
        env:
          RELEASE_BRANCH: ${{ steps.release_branch.outputs.name }}
        run: |
          set -euo pipefail
          python3 scripts/sync-release-lock.py
          if git diff --quiet -- Cargo.lock; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Cargo.lock
          git commit -m "chore(release): synchronize Cargo.lock"
          git push origin "HEAD:$RELEASE_BRANCH"
