name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref — cheap macOS-runner hygiene.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: fmt + clippy
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Apple's containerization 0.30.1 requires swift-tools-version 6.2, which
      # ships in Xcode 26+. macos-15 runners default to Xcode 16 (Swift 6.1).
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: dtolnay/rust-toolchain@stable
      # rust-toolchain.toml pins channel = "1.94", which rustup resolves to a
      # different toolchain alias than whatever stable patch the action installs.
      # Install components against that exact alias so cargo fmt/clippy work.
      - run: rustup toolchain install 1.94 --component rustfmt --component clippy --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  swift-build:
    name: swift build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # build.rs in hephaestus-bridge runs `xcrun swift build` as part
      # of cargo build; a successful cargo build means swift built too.
      - run: cargo build --workspace

  fc-compat-config:
    name: Firecracker API config-only compat
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/setup-go@v5
        with:
          go-version-file: compat/firectl-harness/go.mod
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: scripts/fc-compat-config-only.sh
