name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref — cheap macOS-runner hygiene.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: fmt + clippy
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  swift-build:
    name: swift build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94
      - uses: Swatinem/rust-cache@v2
      # build.rs in hephaestus-bridge runs `xcrun swift build` as part
      # of cargo build; a successful cargo build means swift built too.
      - run: cargo build --workspace

  # TODO: fc-compat job. The firectl-harness currently requires real
  # kernel + rootfs artifacts that aren't easily provisioned on GHA
  # runners; tracked as a Phase F task in the public-push plan
  # (make the harness work with dummy files so wire-shape drift is
  # caught on every PR).
