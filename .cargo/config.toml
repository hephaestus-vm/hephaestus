[build]
target-dir = "build/cargo_target"
rustflags = [
  "-Ccodegen-units=1",
]

# On macOS we wrap the linker so every binary is ad-hoc codesigned with
# hephaestus.entitlements (com.apple.security.virtualization etc.) as part
# of the normal `cargo build`. Without this, any Virtualization.framework
# call fails with VZErrorDomain code 2.
[target.aarch64-apple-darwin]
linker = "scripts/link-and-sign.sh"
# Xcode 27 beta's Swift static runtime emits a strong reference to
# libswiftCompatibilitySpan.dylib, which only resolves via an LC_RPATH into
# /usr/lib/swift (macOS 26+). The cli/firecracker build.rs emit this rpath,
# but only with `-bin=` scoping, so test harnesses that transitively link
# the Swift archive (hephaestus-pool, -vmm, -bridge) abort in dyld under
# `cargo test`. Apply it target-wide so every macOS binary — tests included —
# resolves the dylib at load. NOTE: a `[target.*]` rustflags block replaces
# `[build].rustflags` rather than merging, so `-Ccodegen-units=1` is repeated
# here to keep it in effect for the host target.
rustflags = [
  "-Ccodegen-units=1",
  "-Clink-arg=-Wl,-rpath,/usr/lib/swift",
]

[net]
git-fetch-with-cli = true

[env]
AWS_LC_SYS_NO_JITTER_ENTROPY = "1"
# disable AVX512 as it adds 600k of binary size
# this was only used for MMDS token generation
AWS_LC_SYS_CFLAGS = "-DMY_ASSEMBLER_IS_TOO_OLD_FOR_512AVX"
# Match SwiftPM's macOS floor so the linker doesn't pull in back-deploy
# Swift runtime shims (libswift_Concurrency.dylib etc. at @rpath) for
# deployment targets older than 12.
MACOSX_DEPLOYMENT_TARGET = "15.0"
