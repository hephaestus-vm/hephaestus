language = "C"
pragma_once = true
include_guard = "HEPHAESTUS_BRIDGE_H"
sys_includes = ["stdint.h", "stdbool.h"]
no_includes = true
header = """
/* Auto-generated by cbindgen from the hephaestus-bridge crate.
 * Do not edit by hand. Regenerated on every `cargo build`. */"""

[parse]
parse_deps = false

[export]
include = ["HbVmConfig", "HbStatus", "HbVm"]
prefix = ""

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
